<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>场景生态产品矩阵 - 最终定版</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <style>
        :root {
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --primary: #1e293b; 
            --accent: #3b82f6;  
            --overlay: rgba(255, 255, 255, 0.98);
        }
        body { margin: 0; padding: 15px; background-color: var(--bg-color); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; overflow: hidden; }
        
        .dashboard-container { 
            max-width: 1280px; margin: 0 auto; background: var(--card-bg); 
            border-radius: 20px; /* 圆角加强至 20px */
            box-shadow: 0 15px 40px rgba(0,0,0,0.05); 
            padding: 30px; position: relative;
        }
        
        /* 头部布局：水平平行，标题在左，卡片在右 */
        .header-wrapper {
            display: flex;
            justify-content: space-between;
            align-items: stretch;
            margin-bottom: 5px;
            height: 125px; 
        }

        .header { border-left: 6px solid var(--accent); padding-left: 15px; flex: 0 0 300px; display: flex; flex-direction: column; justify-content: center; }
        .header h1 { color: var(--primary); margin: 0; font-size: 26px; font-weight: 800; letter-spacing: -1px; }
        .header p { color: #94a3b8; margin: 5px 0 0; font-size: 15px; font-weight:800; text-transform: uppercase; letter-spacing: 1.5px; }
        
        /* 场景战略卡片：完全复刻图2布局，动态显隐 */
        #scene-info-display {
            width: 760px;
            background: #fff;
            border-radius: 20px; /* 圆角加强至 20px */
            border: 1px solid #e2e8f0;
            padding: 16px 24px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
            font-size: 13px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: center;
            
            /* CSS 双重状态机：显隐动画 */
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.25s ease-in-out, visibility 0s linear 0.25s;
        }
        #scene-info-display.show-card {
            opacity: 1 !important;
            visibility: visible !important;
            transition: opacity 0.25s ease-in-out, visibility 0s linear 0s;
        }
        
        #scene-info-display .body-text { color: #000; font-weight: bold; line-height: 1.6; }

        /* 画布缩小 20% */
        #chart-main { width: 100%; height: 680px; }

        /* 全屏算法模型（已等比例放大20%） */
        #algo-overlay {
            display: none; position: fixed; inset: 0; background: var(--overlay);
            z-index: 9999; backdrop-filter: blur(20px);
            align-items: center; justify-content: center;
        }
        .content-box {
            width: 85%; max-width: 1140px; padding: 72px;
            background: #fff; border-radius: 20px; /* 圆角加强至 20px */
            border: 1px solid #e2e8f0;
            position: relative; box-shadow: 0 50px 100px rgba(0,0,0,0.1);
        }
        .content-box h2 { font-size: 38px; color: var(--primary); margin-bottom: 36px; border-bottom: 3px solid #f1f5f9; padding-bottom: 18px; }
        .content-box p { font-size: 19px; line-height: 2; color: #334155; }
        .esc-hint { position: absolute; bottom: 35px; right: 45px; color: #94a3b8; font-size: 15px; font-weight: bold; }
    </style>
</head>

                        <div style="width:48%">
                            <b style="color:#3B82F6; font-size:13px;">🚀 内容力-场景协同</b><br/>
                            <span style="color:#000; font-weight:bold;">视觉穿透: ${d[6][0]}</span><br/>
                            <span style="color:#000; font-weight:bold;">生态连带: ${d[6][1]}</span><br/>
                            <span style="color:#000; font-weight:bold;">增长类型: ${d[6][2]}</span><br/>
                            <span style="color:#000; font-weight:bold;">新品活跃: ${d[6][3]}</span><br/>
                            <span style="color:#000; font-weight:bold;">市场规模: ${d[6][4]}</span>
                        </div>
                    </div>
                </div>`;
            }
        },
        xAxis: {
            name: '产品力-技术壁垒', nameLocation: 'center', nameGap: 40, triggerEvent: true,
            min: 1.0, max: 11.5, 
            splitLine: { lineStyle: { color: '#e2e8f0', type: 'dashed' } },
            axisLine: { lineStyle: { color: '#1e293b', width: 2 } },
            axisLabel: { color: '#64748b', fontWeight: 'bold', fontSize: 12 },
            nameTextStyle: { fontWeight: '800', fontSize: 14, color: '#1e293b', cursor: 'pointer' }
        },
        yAxis: {
            name: '内\n容\n力\n-\n场\n景\n协\n同', 
            nameLocation: 'center', nameGap: 60, triggerEvent: true,
            nameRotate: 0,
            min: 1.0, max: 11.5,
            splitLine: { lineStyle: { color: '#e2e8f0', type: 'dashed' } },
            axisLine: { lineStyle: { color: '#1e293b', width: 2 } },
            axisLabel: { color: '#64748b', fontWeight: 'bold', fontSize: 12 },
            nameTextStyle: { fontWeight: '800', fontSize: 14, color: '#1e293b', cursor: 'pointer', verticalAlign: 'middle' }
        },
        series:[
            ...series,
            ...dummySeries,
            {
                type: 'scatter', silent: true,
                markLine: { lineStyle: { type: 'solid', color: '#cbd5e0', width: 2 }, symbol: ['none', 'none'], data:[{ xAxis: 6.0 }, { yAxis: 6.5 }] },
                markArea: {
                    silent: true,
                    label: { show: false }, 
                    data: [[{ xAxis: 6.0, yAxis: 6.5, itemStyle: { color: 'rgba(30, 41, 59, 0.02)' } }, { xAxis: 12, yAxis: 12 }],[{ xAxis: 1, yAxis: 6.5, itemStyle: { color: 'rgba(212, 175, 55, 0.02)' } }, { xAxis: 6.0, yAxis: 12 }]]
                }
            }
        ]
    };

    myChart.setOption(option);

    // ======== 动态多维图例交叉过滤逻辑 ========
    let activeStages = { '迭代期': true, '开发期': true, '概念期': true };

    myChart.on('legendselectchanged', function (params) {
        if (['迭代期', '开发期', '概念期'].includes(params.name)) {
            // 同步当前“阶段”图例的点击状态
            activeStages[params.name] = params.selected[params.name];
            
            // 重新按选中的阶段进行数据过滤，刷新到原生数据流中
            const filteredSeries = Object.keys(colors).map(scene => {
                return {
                    name: scene,
                    data: rawData.filter(d => d[4] === scene && activeStages[d[9]])
                };
            });
            // 调用 setOption (局部更新数据)，不影响其他原有配置
            myChart.setOption({ series: filteredSeries });
        }
    });

    // ======== 点击散点直接跳转腾讯文档 ========
    myChart.on('click', function(params) {
        if (params.componentType === 'series') {
            // 确保不误点到标记线或图例占位符
            if (!['迭代期', '开发期', '概念期'].includes(params.seriesName) && !params.seriesName.includes('mark')) {
                window.open('https://doc.weixin.qq.com/sheet/e3_Aa8AYQb2AKkCNTb0iBqUISsC6Kd43?scode=ANAAOQf-AAwoVyeYfNAa8AYQb2AKk&tab=BB08J2', '_blank');
            }
        } else if (params.componentType === 'xAxis') {
            showModal('产品力-技术壁垒 加权模型', algoX);
        } else if (params.componentType === 'yAxis') {
            showModal('内容力-场景协同 加权模型', algoY);
        }
    });

    let isHoveringDataPoint = false;

    myChart.on('mouseover', 'series', function () {
        isHoveringDataPoint = true;
    });
    myChart.on('mouseout', 'series', function () {
        isHoveringDataPoint = false;
    });

    myChart.on('highlight', function (params) {
        if (isHoveringDataPoint) return; 
        
        let seriesName = null;
        if (params.batch && params.batch.length > 0) {
            seriesName = params.batch[0].seriesName;
        } else if (params.seriesName) {
            seriesName = params.seriesName;
        }

        if (seriesName) {
            const info = sceneInfo[seriesName];
            if (info) {
                sceneDisplay.innerHTML = `
                <div style="font-family: sans-serif; display: flex; flex-direction: column; justify-content: center; height: 100%;">
                    <div style="font-size: 20px; font-weight: 800; color: ${colors[seriesName]}; margin-bottom: 8px; border-bottom: 2px solid #f1f5f9; padding-bottom: 6px;">
                        ${seriesName}
                    </div>
                    <div style="margin-bottom: 8px; display: flex; align-items: flex-start; gap: 6px;">
                        <span style="font-size: 13px; line-height: 1.5;"></span>
                        <div style="font-size: 13px; color: #000; font-weight: bold; line-height: 1.5;">
                            <span style="color: #334e68; font-weight: 800;">场景描述:</span> ${info.desc}
                        </div>
                    </div>
                    <div style="display: flex; align-items: flex-start; gap: 6px;">
                        <span style="font-size: 13px; line-height: 1.5;"></span>
                        <div style="font-size: 13px; color: #000; font-weight: bold; line-height: 1.5;">
                            <span style="color: #334e68; font-weight: 800;">NPI 原则:</span> ${info.npi}
                        </div>
                    </div>
                </div>`;
                sceneDisplay.classList.add('show-card');
            }
        }
    });

    myChart.on('downplay', function (params) {
        if (isHoveringDataPoint) return;
        sceneDisplay.classList.remove('show-card');
    });

    function showModal(title, content) {
        document.getElementById('modal-title').innerText = title;
        document.getElementById('modal-content').innerHTML = content;
        overlay.style.display = 'flex';
    }

    function closeModal() {
        overlay.style.display = 'none';
    }

    window.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') closeModal();
    });

    window.onresize = myChart.resize;
</script>

</body>
</html>
